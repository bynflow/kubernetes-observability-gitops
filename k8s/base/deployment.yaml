apiVersion: apps/v1
kind: Deployment
metadata:
  name: proj3-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proj3-app
  template:
    metadata:
      labels:
        app: proj3-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
      - name: app
        image: ghcr.io/bynflow/proj3-app:sha-adcd9f7
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
