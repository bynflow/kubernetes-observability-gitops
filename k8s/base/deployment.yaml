apiVersion: apps/v1
kind: Deployment
metadata:
  name: proj3-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proj3-app
  template:
    metadata:
      labels:
        app: proj3-app
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
      - name: app
        image: ghcr.io/bynflow/proj3-app:dev
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
